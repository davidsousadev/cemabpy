<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CemabPY</title>

    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">

    <!-- Pyodide -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

    <style>
        body {
            margin: 0;
            background: #0f172a;
            color: white;
            font-family: Arial;
        }

        header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            border-bottom: 1px solid #1f2937;
            font-size: 18px;
            font-weight: bold;
        }

        header img {
            width: 32px;
            height: 32px;
            border-radius: 6px;
        }

        main {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 15px;
            margin-right: 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        #saida {
            background: black;
            color: #22c55e;
            padding: 10px;
            min-height: 120px;
            border-radius: 6px;
            margin-top: 15px;
            font-family: monospace;
            white-space: pre-wrap;
            outline: none;
            cursor: text;
        }

        #cursor {
            display: inline-block;
            width: 8px;
            background: #22c55e;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        #status {
            margin-top: 10px;
            font-size: 14px;
            color: #94a3b8;
        }


        .blink {
            animation: blink 1s infinite;
        }

    </style>
</head>

<body>

    <header>
        <img src="https://cemabjs.vercel.app/icon.jpeg">
        <span>CEMAB - Python</span>
    </header>

    <main>

        <textarea id="editor"></textarea>

        <br><br>

        <button onclick="executar()">▶ Executar</button>
        <button onclick="limpar()">🧹 Limpar</button>
        <button onclick="salvar()">💾 Salvar</button>

        <div id="status">Carregando Python...</div>
<input id="hiddenInput" style="
    position: absolute;
    opacity: 0;
    height: 0;
    width: 0;
    pointer-events: none;
">
        <pre id="saida" tabindex="0"></pre>

    </main>

    <footer style="text-align:center; padding:12px; color:#94a3b8;">
        Criado com ❤️ por David Sousa
    </footer>

    <!-- CodeMirror -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>

<script>
    let editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
        mode: "python",
        theme: "material-darker",
        lineNumbers: true,
        indentUnit: 4,
        tabSize: 4,
        indentWithTabs: false,
        smartIndent: true,
        autoCloseBrackets: true,
        matchBrackets: true
    });
    
    let pyodide;
    let pronto = false;
    
    let saida = document.getElementById("saida");
    let hiddenInput = document.getElementById("hiddenInput");
    
    let inputResolve = null;
    let buffer = "";
    let terminalTexto = "";
    
    // ===== FOCO (CORRETO PARA MOBILE) =====
    saida.addEventListener("click", () => hiddenInput.focus());
    saida.addEventListener("touchstart", () => hiddenInput.focus());
    
    // ===== TERMINAL =====
    function renderCursor(texto) {
        saida.innerHTML = "";
        
        const textNode = document.createTextNode(texto);
        const cursor = document.createElement("span");
        
        cursor.id = "cursor";
        cursor.className = "blink";
        cursor.textContent = " ";
        
        saida.appendChild(textNode);
        saida.appendChild(cursor);
        
        moverCursorFim();
    }
    
    function append(txt) {
        terminalTexto += txt;
        renderCursor(terminalTexto);
    }
    
    function moverCursorFim() {
        saida.scrollTop = saida.scrollHeight;
    }
    
    // ===== INPUT (VERSÃO MOBILE SAFE) =====
    hiddenInput.addEventListener("input", () => {
        if (!inputResolve) return;
        
        let value = hiddenInput.value;
        
        // ENTER (mobile manda \n aqui)
        if (value.includes("\n")) {
            value = value.replace("\n", "");
            
            append("\n");
            inputResolve(buffer);
            
            buffer = "";
            inputResolve = null;
            hiddenInput.value = "";
            return;
        }
        
        buffer += value;
        append(value);
        
        hiddenInput.value = "";
    });
    
    hiddenInput.addEventListener("keydown", (e) => {
        if (!inputResolve) return;
        
        if (e.key === "Backspace") {
            e.preventDefault();
            
            buffer = buffer.slice(0, -1);
            terminalTexto = terminalTexto.slice(0, -1);
            
            renderCursor(terminalTexto);
        }
    });
    
    // ===== PYTHON =====
    async function iniciarPython() {
        pyodide = await loadPyodide();
        pronto = true;
        document.getElementById("status").innerText = "Python pronto 🚀";
        terminalTexto = "";
        renderCursor("");
    }
    iniciarPython();
    
    // ===== EXECUÇÃO =====
    async function executar() {
        
        if (!pronto) return;
        
        let codigo = editor.getValue();
        
        buffer = "";
        terminalTexto = "";
        renderCursor("");
        
        try {
            
            window.pegarInput = (msg) => {
                append(msg);
                
                // 🔥 FOCO CORRETO
                hiddenInput.focus();
                
                return new Promise(resolve => {
                    inputResolve = resolve;
                });
            };
            
            window.escrever = (txt) => {
                append(txt);
            };
            
            codigo = codigo.replaceAll("input(", "await input(");
            
            let codigoIndentado = codigo
                .split("\n")
                .map(l => "    " + l)
                .join("\n");
            
            let pycode =
                "from js import pegarInput, escrever\n" +
                "\n" +
                "def print(*args):\n" +
                "    escrever(' '.join(map(str,args)) + '\\n')\n" +
                "\n" +
                "async def input(msg=''):\n" +
                "    return await pegarInput(msg)\n" +
                "\n" +
                "async def __run():\n" +
                codigoIndentado + "\n" +
                "\n" +
                "await __run()";
            
            await pyodide.runPythonAsync(pycode);
            
        } catch (erro) {
            append("\nErro: " + erro + "\n");
        }
    }
    
    // ===== UTIL =====
    function limpar() {
        buffer = "";
        terminalTexto = "";
        renderCursor("");
    }
    
    function salvar() {
        let nome = prompt("Nome do arquivo:", "codigo.py");
        if (!nome) return;
        
        if (!nome.endsWith(".py")) nome += ".py";
        
        let blob = new Blob([editor.getValue()], { type: "text/x-python" });
        let link = document.createElement("a");
        
        link.href = URL.createObjectURL(blob);
        link.download = nome;
        link.click();
    }
</script>

</body>

</html>
