<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CemabPY</title>

    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">

    <!-- Pyodide -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

    <style>
        body {
            margin: 0;
            background: #0f172a;
            color: white;
            font-family: Arial;
        }

        header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            border-bottom: 1px solid #1f2937;
            font-size: 18px;
            font-weight: bold;
        }

        header img {
            width: 32px;
            height: 32px;
            border-radius: 6px;
        }

        main {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 15px;
            margin-right: 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        #saida {
            background: black;
            color: #22c55e;
            padding: 10px;
            min-height: 120px;
            border-radius: 6px;
            margin-top: 15px;
            font-family: monospace;
        }

        #status {
            margin-top: 10px;
            font-size: 14px;
            color: #94a3b8;
        }

        footer {
            text-align: center;
            padding: 12px;
            border-top: 1px solid #1f2937;
            font-size: 14px;
            color: #94a3b8;
        }

        footer a {
            color: #60a5fa;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <header>
        <img src="https://cemabjs.vercel.app/icon.jpeg">
        <span>CEMAB - Python</span>
    </header>

    <main>

        <textarea id="editor"></textarea>

        <br><br>

        <button onclick="executar()">▶ Executar</button>
        <button onclick="limpar()">🧹 Limpar</button>
        <button onclick="salvar()">💾 Salvar</button>

        <div id="status">Carregando Python...</div>

        <pre id="saida"></pre>

    </main>

    <footer>
        Criado com ❤️ por <a href="https://github.com/davidsousadev" target="_blank">David Sousa</a>
    </footer>

    <!-- CodeMirror -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>

    <!-- 🔥 ADDONS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>

    <script>
        let editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
            mode: "python",
            theme: "material-darker",
            lineNumbers: true,

            // 🔥 AUTO INDENTAÇÃO
            indentUnit: 4,
            tabSize: 4,
            indentWithTabs: false,
            smartIndent: true,

            // 🔥 AUTO FECHAMENTO
            autoCloseBrackets: true,
            matchBrackets: true,

            extraKeys: {
                "Tab": function (cm) {
                    if (cm.somethingSelected()) {
                        cm.indentSelection("add");
                    } else {
                        cm.replaceSelection("    ", "end");
                    }
                },
                "Shift-Tab": function (cm) {
                    cm.indentSelection("subtract");
                },
                "Enter": function (cm) {
                    cm.execCommand("newlineAndIndent");
                }
            }
        });

        let pyodide;
        let pronto = false;

        // Inicializar Python
        async function iniciarPython() {
            pyodide = await loadPyodide();
            pronto = true;
            document.getElementById("status").innerText = "Python pronto 🚀";
        }
        iniciarPython();

        // Executar código
        async function executar() {
            const saida = document.getElementById("saida");
            const status = document.getElementById("status");

            if (!pronto) {
                status.innerText = "Ainda carregando...";
                return;
            }

            let codigo = editor.getValue();

            if (!codigo.trim()) {
                saida.innerText = "Digite um código Python!";
                return;
            }

            if (codigo.includes("<html") || codigo.includes("<!DOCTYPE")) {
                saida.innerText = "Erro: HTML não é código Python!";
                return;
            }

            saida.innerText = "";
            status.innerText = "Executando...";

            try {
                const codigoIndentado = codigo
                    .split("\n")
                    .map(l => "    " + l)
                    .join("\n");

                const resultado = await pyodide.runPythonAsync(`
import sys
from io import StringIO

_output = StringIO()
sys.stdout = _output

def __run_user_code():
${codigoIndentado}

try:
    __run_user_code()
except Exception as e:
    print(e)

_output.getvalue()
        `);

                saida.innerText = resultado || "(sem saída)";
                status.innerText = "Executado com sucesso ✅";

            } catch (erro) {
                saida.innerText = erro;
                status.innerText = "Erro ❌";
            }
        }

        // Limpar
        function limpar() {
            document.getElementById("saida").innerText = "";
        }

        // Salvar
        function salvar() {
            let nome = prompt("Nome do arquivo:", "codigo.py");
            if (!nome) return;

            if (!nome.endsWith(".py")) nome += ".py";

            let blob = new Blob([editor.getValue()], { type: "text/x-python" });
            let link = document.createElement("a");

            link.href = URL.createObjectURL(blob);
            link.download = nome;
            link.click();
        }
    </script>

</body>

</html>
